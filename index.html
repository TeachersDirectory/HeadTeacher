<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>প্রধান শিক্ষক ডিরেক্টরি</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">
    <span class="header-title">প্রধান শিক্ষক ডিরেক্টরি</span>
    
    <div class="header-icon" 
         onclick="openDeveloperPage()" 
         style="font-family: 'Georgia', serif; 
         font-style: italic; 
         font-size: 16px;">
           i
    </div>

</header>


<div class="container" id="homePage">
    
    <div class="search-box" style="position:relative;">
    <input
        type="text"
        id="searchInput"
        placeholder="নাম, বিদ্যালয় বা মোবাইল নম্বর দিয়ে খুঁজুন..."
        onkeyup="searchTeachers()">
    <button 
        id="clearBtn"
        onclick="clearSearch()"
        style="display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:#aaa;cursor:pointer;">
        ✕
    </button>
    </div>

    <div id="teacherList"></div>

</div>



    <div id="developerPage" style="display:none;">

    <div style="background:#00695c;color:white;display:flex;align-items:center;padding:16px;box-shadow:0 2px 5px rgba(0,0,0,.2);position:sticky;top:0;z-index:999;">
        
        <button onclick="closeDeveloperPage()" style="background:rgba(255,255,255,0.2);border:none;color:white;font-size:14px;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:5px;white-space:nowrap;">
            &#8592; Back
        </button>

        <span style="flex:1;text-align:center;font-weight:bold;font-size:18px;padding-right:32px;">
            Developer Information
        </span>

    </div>

    <div class="profile-section">

        <img
            src="images/avatar.png"
            alt="Developer"
            class="avatar">

        <h2 class="dev-name">
            মোঃ নাফিউল ইসলাম ফাহাদ
        </h2>

        <div class="dev-post">
            সহকারী শিক্ষক
        </div>

        <div class="dev-school">
            পশ্চিম চরলাঠিমারা সরকারি প্রাথমিক বিদ্যালয়
        </div>

        <div class="dev-extra">
            <i>আইসিটি বিষয়ক সম্পাদক, প্রাথমিক শিক্ষক সমিতি, পাথরঘাটা, বরগুনা।</i>
        </div>

    </div>

    </div>

    

<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
