function normalize(text){
    if (!text) return "";
    return text.toString()
        .toLowerCase()
        .trim()
        .replace(/[\u09bc]/g, '')
        .replace(/য়/g, 'য়')
        .replace(/ড়/g, '\u09dc')
        .replace(/ঢ়/g, '\u09dd');
}

const teacherList = document.getElementById("teacherList");
const searchBox = document.getElementById("searchBox");
const noResult = document.getElementById("noResult");

function renderTeachers(data){

teacherList.innerHTML = "";

if(data.length === 0){
    noResult.style.display = "block";
    return;
}

noResult.style.display = "none";

data.forEach(teacher => {

teacherList.innerHTML += `
<div class="teacher-card">

    <div class="teacher-info">

        <div class="teacher-name">
            ${teacher[0]}
        </div>

        <div class="teacher-designation">
            ${teacher[1]}
        </div>

        <div class="teacher-school">
            ${teacher[2]}
        </div>

        <div class="teacher-phone">
            ${teacher[3]}
        </div>

    </div>

    <a href="tel:${teacher[3]}" class="call-btn">
        📞
    </a>

</div>
`;

});

}

renderTeachers(teachers);

searchBox.addEventListener("input", () => {

    const keyword = normalize(searchBox.value);

    const filtered = teachers.filter(t =>
        normalize(t[0]).includes(keyword) || // নাম দিয়ে সার্চ
        normalize(t[2]).includes(keyword) || // বিদ্যালয়ের নাম দিয়ে সার্চ
        normalize(t[3]).includes(keyword)    // মোবাইল নম্বর দিয়ে সার্চ
    );

    renderTeachers(filtered);
});

history.pushState({page: "developer"}, "Developer Info");

function closeDeveloperPage(){
    document.querySelector(".header").style.display = "block";
    document.querySelector(".container").style.display = "block";
    document.getElementById("developerPage").style.display = "none";
}

window.addEventListener("popstate", function(event) {
    closeDeveloperPage();
});
