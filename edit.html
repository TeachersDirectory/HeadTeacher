<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>তথ্য সংশোধন</title>

<link rel="stylesheet" href="css/style.css">


<script
src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>
    

</head>

<body>

<header class="header">

    <h1 class="header-title">
        তথ্য সংশোধন
    </h1>

</header>

<div class="container">

    <div class="school-banner">

        <h2 id="schoolName">
            বিদ্যালয়ের নাম
        </h2>
        
    </div>

    <form id="updateForm">

        <div class="form-card">

            <div class="label">
                বর্তমান প্রধান শিক্ষকের নাম
            </div>

            <div class="current-value" id="currentName">
                -
            </div>

            <input
                type="text"
                id="newName"
                class="input-box"
                placeholder="নতুন নাম লিখুন">

        </div>

        <div class="form-card">

            <div class="label">
                বর্তমান পদবী
            </div>

            <div class="current-value" id="currentDesignation">
                -
            </div>

            <input
                type="text"
                id="newDesignation"
                class="input-box"
                placeholder="নতুন পদবী লিখুন">

        </div>

        <div class="form-card">

            <div class="label">
                বর্তমান মোবাইল নম্বর
            </div>

            <div class="current-value" id="currentPhone">
                -
            </div>

            <input
                type="text"
                id="newPhone"
                class="input-box"
                placeholder="নতুন মোবাইল নম্বর লিখুন">

        </div>

        <button
            type="submit"
            class="submit-btn">

            📩 আপডেট পাঠান

        </button>

    </form>

</div>

<script src="js/data.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("DXQ1C6JevFrfjxqpr");

// ======================
// GET TEACHER FROM URL
// ======================

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const teacher = teachers.find(t => t.id === id);

// ======================
// SAFETY CHECK
// ======================

if(!teacher){
    alert("শিক্ষকের তথ্য পাওয়া যায়নি!");
    throw new Error("Teacher not found");
}

// ======================
// LOAD DATA TO PAGE
// ======================

document.getElementById("schoolName").innerText = teacher.school;

document.getElementById("currentName").innerText = teacher.name;
document.getElementById("currentDesignation").innerText = teacher.designation;
document.getElementById("currentPhone").innerText = teacher.phone;

// ======================
// FORM SUBMIT
// ======================

document.getElementById("updateForm").addEventListener("submit", function(e){

    e.preventDefault();

    // Validation
    if(!document.getElementById("newName").value){
        alert("নতুন প্রধান শিক্ষকের নাম লিখুন");
        return;
    }

    if(!document.getElementById("newDesignation").value){
        alert("নতুন পদবী লিখুন");
        return;
    }

    if(!document.getElementById("newPhone").value){
        alert("নতুন মোবাইল নম্বর লিখুন");
        return;
    }

    // Send Email
    emailjs.send(
        "service_tsu2ctq",
        "template_bo6pxoa",
        {
            teacher_name: teacher.name,
            school_name: teacher.school,

            current_name: teacher.name,
            new_name: document.getElementById("newName").value,

            current_designation: teacher.designation,
            new_designation: document.getElementById("newDesignation").value,

            current_phone: teacher.phone,
            new_phone: document.getElementById("newPhone").value
        }
    )
    .then(function(){
        alert("তথ্য সংশোধনের অনুরোধ সফলভাবে পাঠানো হয়েছে।");
        document.getElementById("updateForm").reset();
    })
    .catch(function(error){
        alert("রিকোয়েস্ট পাঠানো যায়নি।");
        console.error(error);
    });

});

</script>

</body>
</html>
